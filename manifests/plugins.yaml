plugins:
  - name: cutepower
    ownership: first_party_submodule
    summary: P0 contracts-first governance plugin for Agent Workflow.
    description_source: sources/submodules/cutepower/.codex-plugin/plugin.json
    source:
      distribution: git_submodule
      path: sources/submodules/cutepower
      remote: git@github.com:Jichao0101/cutepower.git
      branch: main
      commit: 5a87259238b31cacb27f29f59d3390690045c9b1
    install:
      strategy: symlink_submodule_to_codex_plugins
      marketplace: personal-local
    verification:
      require_plugin_manifest: .codex-plugin/plugin.json
      require_commit_match: true

  - name: subpower
    ownership: first_party_submodule
    summary: Subagent-first three-side orchestration runtime.
    description_source: sources/submodules/subpower/.codex-plugin/plugin.json
    source:
      distribution: git_submodule
      path: sources/submodules/subpower
      remote: git@github.com:Jichao0101/subpower.git
      branch: main
      commit: edfdbda6049f000efcfc5dc2aeeff19944dbc239
    install:
      strategy: symlink_submodule_to_codex_plugins
      marketplace: personal-local
    verification:
      require_plugin_manifest: .codex-plugin/plugin.json
      require_commit_match: true
